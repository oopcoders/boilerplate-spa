@if (user()) {
<!-- ACCOUNT (SIGNED IN) -->
<mat-card class="settings-card" appearance="outlined">
    <mat-card-header>
        <mat-card-title>Account</mat-card-title>
        <mat-card-subtitle>Signed in</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
        <mat-list class="details">
            <mat-list-item>
                <mat-icon matListItemIcon>person</mat-icon>
                <div matListItemTitle>Username</div>
                <div matListItemLine class="value">{{ user()!.username }}</div>
            </mat-list-item>

            <mat-divider></mat-divider>

            <mat-list-item>
                <mat-icon matListItemIcon>mail</mat-icon>
                <div matListItemTitle>Email</div>
                <div matListItemLine class="value">{{ user()!.email }}</div>
            </mat-list-item>

            @if (user()!.roles.length) {
            <mat-divider></mat-divider>

            <mat-list-item>
                <mat-icon matListItemIcon>shield</mat-icon>
                <div matListItemTitle>Roles</div>
                <div matListItemLine class="value">{{ user()!.roles.join(', ') }}</div>
            </mat-list-item>
            }
        </mat-list>
    </mat-card-content>

    <mat-card-actions align="end">
        <button mat-stroked-button color="warn" (click)="logout()">
            <mat-icon>logout</mat-icon>
            Logout
        </button>
    </mat-card-actions>
</mat-card>

} @else {
<!-- ACCOUNT (SIGNED OUT) -->
<mat-card class="settings-card" appearance="outlined">
    <mat-card-header>
        <mat-card-title>Account</mat-card-title>
        <mat-card-subtitle>Signed out</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
        <p class="logged-out-text">You are logged out.</p>
    </mat-card-content>
</mat-card>
}

<!-- APPEARANCE (SHOWS FOR BOTH SIGNED IN + SIGNED OUT) -->
<mat-card class="settings-card" appearance="outlined">
    <mat-card-header>
        <mat-card-title>Appearance</mat-card-title>
        <mat-card-subtitle>Theme &amp; mode</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="appearance-content">
        <!-- Dark mode row -->
        <div class="dark-mode-row">
            <span>Dark mode</span>

            <mat-slide-toggle [checked]="theme.isDark()" (change)="theme.toggleDark($event.checked)">
            </mat-slide-toggle>
        </div>

        <mat-divider></mat-divider>

        <!-- Theme color row -->
        <div class="theme-row">
            <div class="label">Theme color</div>

            <mat-button-toggle-group [value]="theme.color()" (change)="theme.setColor($event.value)"
                aria-label="Theme color">
                <mat-button-toggle value="red">Red</mat-button-toggle>
                <mat-button-toggle value="blue">Blue</mat-button-toggle>
                <mat-button-toggle value="green">Green</mat-button-toggle>
            </mat-button-toggle-group>
        </div>
    </mat-card-content>
</mat-card>
