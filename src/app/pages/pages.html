<mat-sidenav-container class="container">

    <!-- LEFT NAV -->
    <mat-sidenav #mainnav [mode]="(isHandset$ | async) ? 'over' : 'side'"
        [opened]="(isHandset$ | async) ? false : true">
        <app-navigation (navigate)="closeMainNavOnMobile()"></app-navigation>
    </mat-sidenav>

    <!-- RIGHT SETTINGS (keep as over) -->
    <mat-sidenav mode="over" #setting position="end">
        <app-settings></app-settings>
    </mat-sidenav>

    <!-- MAIN CONTENT -->
    <mat-sidenav-content>
        <mat-toolbar>
            <button matMiniFab (click)="mainnav.toggle()" class="icon" aria-label="Toggle main navigation">
                <mat-icon>menu</mat-icon>
            </button>

            <span class="logo-title">BOILERPLATE</span>
            <span class="spacer"></span>

            @if (isLoggedIn$ | async) {
            <button matMiniFab (click)="setting.toggle()" aria-label="Open settings">
                <mat-icon>tune</mat-icon>
            </button>
            } @else {
            <button matButton="tonal" (click)="openLoginDialog()">
                Log In
            </button>
            <button matButton="filled" (click)="openRegisterDialog()">
                Sign Up
            </button>
            }
        </mat-toolbar>

        <router-outlet></router-outlet>
    </mat-sidenav-content>

</mat-sidenav-container>
